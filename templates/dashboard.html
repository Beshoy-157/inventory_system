<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .container {
            width: 85%;
            margin: auto;
            margin-top: 40px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        /* 🔥 STATS */
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .card {
            background: #1e293b;
            padding: 25px;
            border-radius: 15px;
            width: 30%;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            background: #334155;
        }

        .card h2 {
            margin: 0;
            font-size: 35px;
        }

        .card p {
            margin: 10px 0 0;
            color: #94a3b8;
        }

        /* 🧠 ACTIONS */
        .actions {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .box {
            background: #1e293b;
            padding: 25px;
            border-radius: 15px;
            width: 48%;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .add-btn {
            background: #22c55e;
            color: white;
        }

        .sell-btn {
            background: #ef4444;
            color: white;
        }

        /* 🔗 LINKS */
        .links {
            margin-top: 40px;
            text-align: center;
        }

        .links a {
            margin: 10px;
            padding: 12px 20px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 10px;
        }

        .links a:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>📊 Dashboard</h1>

    <!-- 🔥 STATS -->
    <div class="stats">
        <div class="card">
            <h2>{{ total_products }}</h2>
            <p>Products</p>
        </div>

        <div class="card">
            <h2>{{ total_quantity }}</h2>
            <p>Total Quantity</p>
        </div>

        <div class="card">
            <h2>{{ total_transactions }}</h2>
            <p>Transactions</p>
        </div>
    </div>

    <!-- 🧠 ACTIONS -->
    <div class="actions">

        <!-- ➕ ADD -->
        <div class="box">
            <h3>➕ Add Product</h3>
            <form action="/add" method="POST">
                <input type="text" name="name" placeholder="Product name" required>
                <input type="number" name="qty" placeholder="Quantity" required>
                <button class="add-btn">Add</button>
            </form>
        </div>

        <!-- ➖ SELL -->
        <div class="box">
            <h3>➖ Sell Product</h3>
            <form action="/sell" method="POST">
                <input type="text" name="name" placeholder="Product name" required>
                <input type="number" name="qty" placeholder="Quantity" required>
                <button class="sell-btn">Sell</button>
            </form>
        </div>

    </div>

    <!-- 🔗 LINKS -->
    <div class="links">
        <a href="/stock">📦 View Stock</a>
        <a href="/transactions">🧾 View Transactions</a>
    </div>

</div>

</body>
</html>
